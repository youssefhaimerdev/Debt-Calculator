<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07101E"/>
      <stop offset="100%" stop-color="#0C1828"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D67A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D67A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D67A"/>
      <stop offset="100%" stop-color="#00D67A" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#00D67A" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow radial -->
  <ellipse cx="600" cy="180" rx="500" ry="200" fill="#00D67A" fill-opacity="0.06"/>

  <!-- Logo badge -->
  <rect x="60" y="56" width="44" height="44" rx="11" fill="#0C1828" stroke="#00D67A" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="82" y="85" font-family="Georgia,serif" font-size="24" font-weight="700" fill="#00D67A" text-anchor="middle">$</text>

  <!-- Logo text -->
  <text x="116" y="83" font-family="Georgia,serif" font-size="22" font-weight="600" fill="#ECF1F9">Debt</text>
  <text x="161" y="83" font-family="Georgia,serif" font-size="22" font-weight="600" fill="#00D67A">Free</text>
  <text x="204" y="83" font-family="Georgia,serif" font-size="22" font-weight="600" fill="#ECF1F9">Calc</text>

  <!-- Eyebrow -->
  <rect x="60" y="152" width="220" height="28" rx="14" fill="#00D67A" fill-opacity="0.12"/>
  <rect x="60" y="152" width="220" height="28" rx="14" fill="none" stroke="#00D67A" stroke-opacity="0.25" stroke-width="1"/>
  <text x="170" y="171" font-family="Arial,sans-serif" font-size="12" font-weight="600" fill="#00D67A" text-anchor="middle" letter-spacing="1">FREE · NO SIGN-UP</text>

  <!-- Main headline -->
  <text x="60" y="250" font-family="Georgia,serif" font-size="62" font-weight="700" fill="#ECF1F9">See exactly when</text>
  <text x="60" y="326" font-family="Georgia,serif" font-size="62" font-weight="700" fill="#ECF1F9">you'll be <tspan fill="#00D67A">debt-free</tspan></text>

  <!-- Subheadline -->
  <text x="60" y="378" font-family="Arial,sans-serif" font-size="22" fill="#7A9BB5">Enter your balance, APR, and monthly payment.</text>
  <text x="60" y="406" font-family="Arial,sans-serif" font-size="22" fill="#7A9BB5">Get your payoff date and full amortization schedule instantly.</text>

  <!-- Stat cards -->
  <!-- Card 1 -->
  <rect x="60" y="460" width="230" height="110" rx="14" fill="#0C1828" stroke="#00D67A" stroke-opacity="0.2" stroke-width="1"/>
  <text x="84" y="492" font-family="Arial,sans-serif" font-size="11" fill="#3D5A78" letter-spacing="1">PAYOFF DATE</text>
  <text x="84" y="534" font-family="'Courier New',monospace" font-size="30" font-weight="600" fill="#00D67A">Mar 2027</text>
  <text x="84" y="556" font-family="Arial,sans-serif" font-size="13" fill="#3D5A78">26 months from today</text>

  <!-- Card 2 -->
  <rect x="310" y="460" width="230" height="110" rx="14" fill="#0C1828" stroke="#F5A623" stroke-opacity="0.2" stroke-width="1"/>
  <text x="334" y="492" font-family="Arial,sans-serif" font-size="11" fill="#3D5A78" letter-spacing="1">INTEREST SAVED</text>
  <text x="334" y="534" font-family="'Courier New',monospace" font-size="30" font-weight="600" fill="#F5A623">$1,840</text>
  <text x="334" y="556" font-family="Arial,sans-serif" font-size="13" fill="#3D5A78">vs. minimum payments</text>

  <!-- Card 3 -->
  <rect x="560" y="460" width="230" height="110" rx="14" fill="#0C1828" stroke="#ECF1F9" stroke-opacity="0.08" stroke-width="1"/>
  <text x="584" y="492" font-family="Arial,sans-serif" font-size="11" fill="#3D5A78" letter-spacing="1">TOTAL PAID</text>
  <text x="584" y="534" font-family="'Courier New',monospace" font-size="30" font-weight="600" fill="#ECF1F9">$6,840</text>
  <text x="584" y="556" font-family="Arial,sans-serif" font-size="13" fill="#3D5A78">on $5,000 balance</text>

  <!-- Right side chart mockup -->
  <rect x="820" y="140" width="340" height="360" rx="18" fill="#0C1828" stroke="#00D67A" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Chart label -->
  <text x="840" y="172" font-family="Arial,sans-serif" font-size="11" fill="#3D5A78" letter-spacing="1">PAYOFF TIMELINE</text>

  <!-- Simulated chart bars/curve -->
  <g opacity="0.9">
    <!-- Balance bars going down -->
    <rect x="848" y="200" width="18" height="240" rx="4" fill="url(#bar1)" opacity="0.8"/>
    <rect x="874" y="215" width="18" height="225" rx="4" fill="url(#bar1)" opacity="0.75"/>
    <rect x="900" y="232" width="18" height="208" rx="4" fill="url(#bar1)" opacity="0.7"/>
    <rect x="926" y="252" width="18" height="188" rx="4" fill="url(#bar1)" opacity="0.65"/>
    <rect x="952" y="274" width="18" height="166" rx="4" fill="url(#bar1)" opacity="0.6"/>
    <rect x="978" y="299" width="18" height="141" rx="4" fill="url(#bar1)" opacity="0.55"/>
    <rect x="1004" y="328" width="18" height="112" rx="4" fill="url(#bar1)" opacity="0.5"/>
    <rect x="1030" y="360" width="18" height="80" rx="4" fill="url(#bar1)" opacity="0.45"/>
    <rect x="1056" y="396" width="18" height="44" rx="4" fill="url(#bar1)" opacity="0.4"/>
    <rect x="1082" y="430" width="18" height="10" rx="4" fill="url(#bar1)" opacity="0.35"/>
    <!-- Interest accumulation -->
    <rect x="848" y="436" width="18" height="4" rx="2" fill="url(#bar2)" opacity="0.9"/>
    <rect x="874" y="434" width="18" height="6" rx="2" fill="url(#bar2)" opacity="0.85"/>
    <rect x="900" y="430" width="18" height="10" rx="2" fill="url(#bar2)" opacity="0.8"/>
    <rect x="926" y="425" width="18" height="15" rx="2" fill="url(#bar2)" opacity="0.75"/>
    <rect x="952" y="418" width="18" height="22" rx="2" fill="url(#bar2)" opacity="0.7"/>
    <rect x="978" y="408" width="18" height="32" rx="2" fill="url(#bar2)" opacity="0.65"/>
    <rect x="1004" y="396" width="18" height="44" rx="2" fill="url(#bar2)" opacity="0.6"/>
    <rect x="1030" y="382" width="18" height="58" rx="2" fill="url(#bar2)" opacity="0.55"/>
    <rect x="1056" y="366" width="18" height="74" rx="2" fill="url(#bar2)" opacity="0.5"/>
    <rect x="1082" y="348" width="18" height="92" rx="2" fill="url(#bar2)" opacity="0.45"/>
  </g>

  <!-- Legend -->
  <rect x="840" y="460" width="10" height="10" rx="2" fill="#00D67A"/>
  <text x="856" y="470" font-family="Arial,sans-serif" font-size="11" fill="#7A9BB5">Balance</text>
  <rect x="910" y="460" width="10" height="10" rx="2" fill="#F5A623"/>
  <text x="926" y="470" font-family="Arial,sans-serif" font-size="11" fill="#7A9BB5">Interest</text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#00D67A" fill-opacity="0.15"/>
  <rect x="0" y="625" width="400" height="5" fill="#00D67A" fill-opacity="0.4"/>

  <!-- URL -->
  <text x="60" y="608" font-family="'Courier New',monospace" font-size="14" fill="#3D5A78">debtpayoffcalculator.app</text>
</svg>
